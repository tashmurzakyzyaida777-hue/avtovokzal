{% extends 'base.html' %}
{% load i18n %}
{% block title %}FAQ — {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="container container-narrow section">
  <h1>{% trans 'Часто задаваемые вопросы' %}</h1>
  <div class="mt-3" x-data="{ open: null }">
    {% for f in faqs %}
      <div class="card mb-1" style="padding:0">
        <button @click="open = open === {{ forloop.counter }} ? null : {{ forloop.counter }}"
          style="all:unset;cursor:pointer;width:100%;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;font-weight:600">
          <span>{{ f.question }}</span>
          <span x-text="open === {{ forloop.counter }} ? '−' : '+'" style="font-size:1.5rem;color:var(--accent)"></span>
        </button>
        <div x-show="open === {{ forloop.counter }}" x-transition style="padding:0 22px 18px;color:var(--text-muted)">{{ f.answer|linebreaks }}</div>
      </div>
    {% empty %}
      <p class="text-muted">{% trans 'Пока нет вопросов.' %}</p>
    {% endfor %}
  </div>
</div>
{% endblock %}
